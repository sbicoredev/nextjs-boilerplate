services:
  postgres:
    image: postgres:alpine
    restart: always
    container_name: nextjs-boilerplate-db
    shm_size: 128mb
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - nextjs-boilerplate

  mailpit:
    image: axllent/mailpit
    restart: always
    container_name: nextjs-boilerplate-mail
    environment:
      MP_DATABASE: /data/mailpit.db
    ports:
      - 8025:8025
      - 1025:1025
    networks:
      - nextjs-boilerplate

volumes:
  db-data:

networks:
  nextjs-boilerplate:
